<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libre Games | Console</title>
    <style>
        :root { --bg: #0b0e14; --card: #1a1f29; --accent: #00f2ff; }
        body { 
            margin: 0; background: var(--bg); color: white; 
            font-family: 'Segoe UI', system-ui, sans-serif; height: 100vh;
            display: flex; flex-direction: column; overflow: hidden;
        }

        header { padding: 40px; }
        h1 { margin: 0; color: white; text-transform: uppercase; letter-spacing: 4px; border-left: 5px solid var(--accent); padding-left: 15px; }

        /* Contenedor del Slider (Consola) */
        .slider-container { 
            flex-grow: 1; display: flex; align-items: center; 
            overflow-x: auto; padding: 0 50px; gap: 40px;
            scroll-snap-type: x mandatory; scroll-behavior: smooth;
        }

        /* Tarjeta tipo "Box Art" de consola */
        .game-card { 
            min-width: 280px; height: 350px; background: var(--card);
            border-radius: 12px; display: flex; flex-direction: column;
            justify-content: flex-end; padding: 20px;
            scroll-snap-align: center; border: 2px solid transparent;
            transition: all 0.3s ease; position: relative;
        }

        .game-card:hover, .game-card:focus { 
            border-color: var(--accent); transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
        }

        .game-card h2 { margin: 0 0 10px 0; font-size: 1.5rem; }

        .action-btn { 
            background: white; border: none; padding: 12px; 
            border-radius: 6px; font-weight: bold; cursor: pointer;
            text-transform: uppercase; transition: background 0.2s;
        }

        .action-btn:hover { background: var(--accent); }

        /* Ajuste responsivo */
        @media (max-width: 600px) {
            h1 { font-size: 1.5rem; }
            .game-card { min-width: 220px; height: 300px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Libre Games</h1>
    </header>

    <div class="slider-container" id="game-slider"></div>

    <script>
        async function cargarTienda() {
            const resp = await fetch('games.json');
            const juegos = await resp.json();
            const slider = document.getElementById('game-slider');

            juegos.forEach(juego => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.innerHTML = `
                    <h2>${juego.titulo}</h2>
                    <button class="action-btn" onclick="window.location.href='${juego.ruta}'">
                        JUGAR
                    </button>
                `;
                slider.appendChild(card);
            });
        }
        cargarTienda();
    </script>
</body>
</html>
