<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libre Games | Console</title>
    <style>
        :root { --bg: #0b0e14; --card: #1c222d; --accent: #00f2ff; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }
        
        header { padding: 40px 20px; border-bottom: 2px solid #2d3748; background: #0f172a; }
        h1 { margin: 0; font-size: 2rem; color: var(--accent); letter-spacing: 4px; text-transform: uppercase; }

        /* Contenedor Responsivo: PC = Grid, Móvil = Flex Slider */
        .console-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 30px; 
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .game-card { 
            background: var(--card); 
            border-radius: 16px; 
            padding: 20px; 
            border: 2px solid transparent;
            transition: all 0.3s ease;
            cursor: pointer;
            text-align: center;
        }

        .game-card:hover { border-color: var(--accent); transform: translateY(-10px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .game-card h2 { margin: 0 0 15px 0; color: white; }

        .action-btn { 
            background: transparent; border: 2px solid var(--accent); 
            color: var(--accent); padding: 10px 20px; border-radius: 8px; 
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }

        .game-card:hover .action-btn { background: var(--accent); color: var(--bg); }

        /* Ajuste móvil */
        @media (max-width: 600px) {
            .console-grid { grid-template-columns: 1fr; padding: 20px; }
            h1 { font-size: 1.5rem; text-align: center; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Libre Games</h1>
    </header>

    <main class="console-grid" id="game-slider"></main>

    <script>
        async function cargarTienda() {
            try {
                const respuesta = await fetch('games.json');
                const juegos = await respuesta.json();
                const container = document.getElementById('game-slider');

                juegos.forEach(juego => {
                    const card = document.createElement('div');
                    card.className = 'game-card';
                    card.innerHTML = `
                        <h2>${juego.titulo}</h2>
                        <button class="action-btn" onclick="window.location.href='${juego.ruta}'">
                            PLAY
                        </button>
                    `;
                    container.appendChild(card);
                });
            } catch (err) {
                console.error("Error al cargar juegos:", err);
            }
        }
        cargarTienda();
    </script>
</body>
</html>
