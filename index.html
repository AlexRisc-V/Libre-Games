<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="manifest.json">
    <title>Libre Games</title>
    <style>
        body { margin: 0; background: #0b0e14; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 40px; border-left: 5px solid #00f2ff; margin: 20px; }
        .slider { display: flex; overflow-x: auto; gap: 20px; padding: 20px; scroll-snap-type: x mandatory; flex-grow: 1; align-items: center; }
        .card { min-width: 200px; background: #1a1f29; padding: 40px; border-radius: 10px; scroll-snap-align: center; text-align: center; }
        button { background: #00f2ff; border: none; padding: 15px 30px; border-radius: 5px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

<header><h1>LIBRE GAMES</h1></header>
<div class="slider" id="slider"></div>

<script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

    async function cargarJuegos() {
        const res = await fetch('games.json');
        const juegos = await res.json();
        const slider = document.getElementById('slider');

        for (const j of juegos) {
            const card = document.createElement('div');
            card.className = 'card';
            const instalado = await caches.has(j.id); // Verificamos si existe caché con el id del juego
            
            card.innerHTML = `<h2>${j.titulo}</h2>
            <button onclick="gestionarJuego('${j.id}', '${j.ruta}', this)">
                ${instalado ? 'JUGAR' : 'DESCARGAR'}
            </button>`;
            slider.appendChild(card);
        }
    }

    async function gestionarJuego(id, ruta, btn) {
        if (btn.innerText === 'DESCARGAR') {
            const cache = await caches.open(id);
            await cache.add(ruta); // Descarga el archivo del juego
            btn.innerText = 'JUGAR';
        } else {
            window.location.href = ruta;
        }
    }

    cargarJuegos();
</script>
</body>
</html>
